<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}GameMatch{% endblock %} — подбор игр по ПК</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="bg-grid"></div>
  <header class="site-header">
    <a href="/" class="logo">
      <span class="logo-icon">▶</span>
      <span>Game<strong>Match</strong></span>
    </a>
    <p class="tagline">Подбор игр по характеристикам вашего ПК</p>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>Оценки основаны на типовых системных требованиях. Реальная производительность зависит от конкретной модели железа.</p>
  </footer>
</body>
</html>
